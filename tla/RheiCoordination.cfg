SPECIFICATION Spec

CONSTANTS
    Procs     = {0, 1}
    MaxEpoch  = 3
    Keys      = {"k1", "k2"}
    None      = None

INVARIANTS
    TypeOK
    AllFlushedAtCommit
    ProcPendingSubsetFrontier

\* Liveness properties omitted: with unrestricted PipelineCrash, infinite
\* crash loops can prevent progress. This is inherent to crash-recovery
\* systems without an upper bound on crash frequency. Safety invariants
\* (AllFlushedAtCommit, TypeOK, ProcPendingSubsetFrontier) are the primary
\* verification targets for the coordination protocol.
