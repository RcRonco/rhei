name: Dashboard CI

on:
  push:
    branches: [main]
    paths:
      - "rhei-dashboard/**"
  pull_request:
    paths:
      - "rhei-dashboard/**"

jobs:
  build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rhei-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rhei-dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check & build
        run: npm run build
