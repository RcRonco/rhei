[graph]
all-features = true

[advisories]
ignore = [
    # Transitive dependencies we can't control
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is a transitive dep from foyer/timely, considered complete by maintainers" },
    { id = "RUSTSEC-2024-0436", reason = "paste is a transitive dep from foyer/timely" },
    { id = "RUSTSEC-2026-0044", reason = "Rust TLS stack is used by object_store->slatedb" },
    { id = "RUSTSEC-2026-0045", reason = "Rust TLS stack is used by object_store->slatedb" },
    { id = "RUSTSEC-2026-0046", reason = "Rust TLS stack is used by object_store->slatedb" },
    { id = "RUSTSEC-2026-0047", reason = "Rust TLS stack is used by object_store->slatedb" },
    { id = "RUSTSEC-2026-0048", reason = "Rust TLS stack is used by object_store->slatedb" },
    { id = "RUSTSEC-2026-0049", reason = "Rust TLS stack is used by object_store->slatedb" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
workspace-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
